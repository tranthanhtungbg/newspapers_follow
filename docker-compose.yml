version: '3.9'

# =============================================================
# LingoReader — Docker Infrastructure
# Services: PostgreSQL · Redis · MinIO (S3-compatible)
# Usage: docker-compose up -d
# =============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lingoreader_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lingoreader}
      POSTGRES_USER: ${POSTGRES_USER:-lingoreader_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lingoreader_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/migrations.sql:/docker-entrypoint-initdb.d/01-migrations.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lingoreader_user} -d ${POSTGRES_DB:-lingoreader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingoreader_network

  # -----------------------------------------------------------
  # Redis 7 — Cache · Sessions · BullMQ Queues
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lingoreader_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename "appendonly.aof"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingoreader_network

  # -----------------------------------------------------------
  # MinIO — S3-Compatible Object Storage
  # Stores: TTS Audio Files · PostgreSQL Backups
  # Console UI: http://localhost:9001
  # -----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: lingoreader_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - lingoreader_network

  # -----------------------------------------------------------
  # MinIO Setup — Creates default buckets on first run
  # -----------------------------------------------------------
  minio_setup:
    image: minio/mc:latest
    container_name: lingoreader_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-minio_secret_123};
        mc mb --ignore-existing local/lingoreader-audio;
        mc mb --ignore-existing local/lingoreader-backups;
        mc anonymous set download local/lingoreader-audio;
        echo 'MinIO buckets initialized.';
        exit 0;
      "
    networks:
      - lingoreader_network

  # -----------------------------------------------------------
  # Redis Commander — Redis Web UI (Development Only)
  # Access: http://localhost:8081
  # -----------------------------------------------------------
  redis_commander:
    image: rediscommander/redis-commander:latest
    container_name: lingoreader_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "lingoreader:redis:6379:0:${REDIS_PASSWORD:-redis_secret}"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lingoreader_network
    profiles:
      - dev  # only starts with: docker-compose --profile dev up

# -----------------------------------------------------------
# Named Volumes — Persistent Data
# -----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# -----------------------------------------------------------
# Networks
# -----------------------------------------------------------
networks:
  lingoreader_network:
    driver: bridge
